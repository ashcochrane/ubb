[pytest]
DJANGO_SETTINGS_MODULE = config.settings
# The pytest defaults plus `conformance`: the schemathesis sweep (#87) is
# non-gating and needs an extra dependency, so the default suite never
# collects it. Run it explicitly: `python -m pytest conformance`.
norecursedirs = *.egg .* _darcs build CVS dist node_modules venv {arch} conformance
