# CI for the UBB monorepo: ubb-platform (Django) + ubb-sdk (Python client).
#
# - Python is pinned to 3.13 to match the development venv (3.13.14).
# - Dependencies install from ubb-platform/requirements.lock.txt (the frozen,
#   reproducible set — includes pytest/pytest-django/factory_boy); the SDK is
#   installed editable from the checkout, mirroring the dev venv.
# - DJANGO_SETTINGS_MODULE comes from ubb-platform/pytest.ini for the suite and
#   from manage.py for the management commands; it is NOT set here.
#
# Env contract (config/settings.py):
#   SECRET_KEY            required at import (settings.py:12 — KeyError without it).
#   DEBUG=True            DEBUG=False demands ALLOWED_HOSTS at import
#                         (settings.py:18-20) and enables SECURE_SSL_REDIRECT,
#                         which would 301 every Django-test-client request;
#                         True matches the dev .env.
#   DATABASE_URL          the postgres:16 service below (user is the instance
#                         superuser, so the test-database CREATE works).
#   REDIS_URL             the redis:7 service below; the root conftest.py moves
#                         tests onto DB index 15 of the same server.
#   STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET
#                         dummies — the autouse conftest guard forces a sentinel
#                         key and blocks real Stripe network I/O, and the one
#                         live test stays skipped (UBB_STRIPE_LIVE_TEST unset).
# Everything else settings.py reads has a safe default (ALLOWED_HOSTS, UBB_*,
# STRIPE_TEST_*, STRIPE_CONNECT_CLIENT_ID, CORS_ALLOWED_ORIGINS).

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ubb
          POSTGRES_PASSWORD: ubb
          POSTGRES_DB: ubb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ubb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://ubb:ubb@localhost:5432/ubb
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci-only-dummy-secret-key
      DEBUG: "True"
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ubb-platform/requirements.lock.txt

      - name: Install dependencies (locked)
        run: |
          python -m pip install --upgrade pip
          pip install -r ubb-platform/requirements.lock.txt
          pip install -e ./ubb-sdk

      - name: Django system check
        working-directory: ubb-platform
        run: python manage.py check

      - name: Migrations are complete (makemigrations --check)
        working-directory: ubb-platform
        run: python manage.py makemigrations --check --dry-run

      - name: Platform test suite
        working-directory: ubb-platform
        run: python -m pytest

      - name: SDK test suite
        working-directory: ubb-sdk
        run: python -m pytest
