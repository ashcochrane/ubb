# CI for the UBB monorepo: ubb-platform (Django) + ubb-sdk (Python client).
#
# - Python is pinned to 3.13 to match the development venv (3.13.14).
# - Dependencies install from ubb-platform/requirements.lock.txt (the frozen,
#   reproducible set — includes pytest/pytest-django/factory_boy); the SDK is
#   installed editable from the checkout, mirroring the dev venv.
# - DJANGO_SETTINGS_MODULE comes from ubb-platform/pytest.ini for the suite and
#   from manage.py for the management commands; it is NOT set here.
#
# Env contract (config/settings.py):
#   SECRET_KEY            required at import (settings.py:12 — KeyError without it).
#   DEBUG=True            DEBUG=False demands ALLOWED_HOSTS at import
#                         (settings.py:18-20) and enables SECURE_SSL_REDIRECT,
#                         which would 301 every Django-test-client request;
#                         True matches the dev .env.
#   DATABASE_URL          the postgres:16 service below (user is the instance
#                         superuser, so the test-database CREATE works).
#   REDIS_URL             the redis:7 service below; the root conftest.py moves
#                         tests onto DB index 15 of the same server.
#   STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET
#                         dummies — the autouse conftest guard forces a sentinel
#                         key and blocks real Stripe network I/O, and the one
#                         live test stays skipped (UBB_STRIPE_LIVE_TEST unset).
# Everything else settings.py reads has a safe default (ALLOWED_HOSTS, UBB_*,
# STRIPE_TEST_*, STRIPE_CONNECT_CLIENT_ID, CORS_ALLOWED_ORIGINS).

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ubb
          POSTGRES_PASSWORD: ubb
          POSTGRES_DB: ubb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ubb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://ubb:ubb@localhost:5432/ubb
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci-only-dummy-secret-key
      DEBUG: "True"
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ubb-platform/requirements.lock.txt

      - name: Install dependencies (locked)
        run: |
          python -m pip install --upgrade pip
          pip install -r ubb-platform/requirements.lock.txt
          pip install -e ./ubb-sdk

      - name: Django system check
        working-directory: ubb-platform
        run: python manage.py check

      - name: Migrations are complete (makemigrations --check)
        working-directory: ubb-platform
        run: python manage.py makemigrations --check --dry-run

      - name: Platform test suite
        working-directory: ubb-platform
        run: python -m pytest

      - name: SDK test suite
        working-directory: ubb-sdk
        run: python -m pytest

  # Schemathesis conformance sweep (#87): fuzz the app in-process against the
  # committed openapi/v1.json and report every place the implementation
  # contradicts the document (see ubb-platform/conformance/). WANTED, NOT
  # GATING — continue-on-error on the sweep step means findings annotate the
  # run and land in the job summary + artifact, but never turn a PR red.
  # Promoting this to a gate is a separate future decision. Schemathesis is
  # installed here, pinned, not in the lock — the same in-job tool pattern as
  # oasdiff and the SDK generator below.
  conformance:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ubb
          POSTGRES_PASSWORD: ubb
          POSTGRES_DB: ubb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ubb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://ubb:ubb@localhost:5432/ubb
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci-only-dummy-secret-key
      DEBUG: "True"
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ubb-platform/requirements.lock.txt

      - name: Install dependencies (locked) + schemathesis (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install -r ubb-platform/requirements.lock.txt
          pip install "schemathesis==4.24.2"

      - name: Conformance sweep (non-blocking)
        id: sweep
        continue-on-error: true
        working-directory: ubb-platform
        run: |
          python -m pytest conformance -q --tb=long 2>&1 | tee /tmp/conformance-report.txt
          exit "${PIPESTATUS[0]}"

      - name: Publish the report to the job summary
        if: always()
        run: |
          {
            echo "## Schemathesis conformance sweep (non-gating, #87)"
            if [ "${{ steps.sweep.outcome }}" = "success" ]; then
              echo "No conformance findings."
            else
              echo "Findings below — triage into bug tickets; this job never gates a PR."
            fi
            echo '```'
            tail -c 60000 /tmp/conformance-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-report
          path: /tmp/conformance-report.txt

  # The spec-as-truth ratchet (#77, ADR-002): the committed openapi/v1.json is
  # the single source of truth for the tenant surface. Three gates:
  #   drift    — offline regeneration must produce zero diff (code == document)
  #   breaking — oasdiff against the base branch's spec; the committed
  #              suppression files make accepting a break a visible, reviewed
  #              change; severity-levels encodes the ADR-003 open-enum stance
  #   TS smoke — the committed spec must generate clean TypeScript types
  # The env block mirrors the test job's: settings import needs the vars, but
  # nothing here touches Postgres/Redis, so no services are started.
  contract:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://ubb:ubb@localhost:5432/ubb
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci-only-dummy-secret-key
      DEBUG: "True"
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      OASDIFF_VERSION: 1.23.0

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the breaking gate compares against the base
          # branch's (PR) or parent commit's (push) committed spec.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ubb-platform/requirements.lock.txt

      - name: Install dependencies (locked)
        run: |
          python -m pip install --upgrade pip
          pip install -r ubb-platform/requirements.lock.txt

      - name: Drift gate — offline regeneration produces zero diff
        working-directory: ubb-platform
        run: |
          python scripts/export_openapi.py
          git -C .. diff --exit-code -- openapi/v1.json

      # The SDK's generated transport+DTO core (ubb/_core) rides the SAME
      # ratchet as the spec (issue #84, ADR-002): the committed core must be
      # exactly what the pinned generator produces from the committed spec, so
      # hand edits and stale-spec cores turn CI red. The generator version is
      # the only input (ruff post-hook disabled, newlines LF-normalized), so
      # this Linux runner reproduces the bytes committed from any OS.
      - name: SDK core regeneration gate — zero diff
        run: |
          pip install "openapi-python-client==0.29.0"
          python ubb-sdk/codegen/generate_core.py
          git diff --exit-code -- ubb-sdk/ubb/_core ubb-sdk/ubb/_spec_revision.py

      # The registry-derived exception hierarchy rides the ratchet too: the
      # committed ubb/_exceptions_generated.py must be exactly what the
      # generator produces from openapi/error-codes.json (issue #84).
      - name: SDK exception hierarchy regeneration gate — zero diff
        run: |
          python ubb-sdk/codegen/generate_exceptions.py
          git diff --exit-code -- ubb-sdk/ubb/_exceptions_generated.py

      - name: Install oasdiff (pinned)
        run: |
          curl -sSfL -o /tmp/oasdiff.tar.gz \
            "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/oasdiff.tar.gz -C /tmp oasdiff
          sudo mv /tmp/oasdiff /usr/local/bin/oasdiff

      - name: Breaking gate — oasdiff vs the base spec (open-enum config)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="HEAD^"
          fi
          if git cat-file -e "$BASE_REF:openapi/v1.json" 2>/dev/null; then
            git show "$BASE_REF:openapi/v1.json" > /tmp/base-v1.json
            oasdiff breaking --fail-on WARN \
              --severity-levels openapi/oasdiff-severity-levels.txt \
              --err-ignore openapi/oasdiff-err-ignore.txt \
              --warn-ignore openapi/oasdiff-warn-ignore.txt \
              --format githubactions \
              /tmp/base-v1.json openapi/v1.json
          else
            echo "No committed spec at $BASE_REF (first spec commit) — nothing to compare."
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: TypeScript smoke gate — committed spec generates clean types
        run: npx --yes openapi-typescript@7.13.0 openapi/v1.json -o /tmp/ubb-v1.d.ts
