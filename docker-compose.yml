services:
  postgres:
    image: postgres:16
    container_name: ubb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ubb
      POSTGRES_PASSWORD: ubb
      POSTGRES_DB: ubb
    ports:
      - "5432:5432"
    volumes:
      - ubb_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ubb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  ubb_postgres_data:
